<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RA Groups Decision Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .wrapper {
      max-width: 800px;
      width: 100%;
      padding: 24px;
    }
    .card {
      background: #020617;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 20px 30px rgba(15, 23, 42, 0.7);
      border: 1px solid #1f2937;
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 22px;
      color: #f9fafb;
    }
    p.subtitle {
      margin-top: 0;
      margin-bottom: 18px;
      color: #9ca3af;
      font-size: 14px;
    }
    label {
      font-size: 14px;
      color: #d1d5db;
      display: block;
      margin-bottom: 6px;
    }
    textarea, input {
      width: 100%;
      box-sizing: border-box;
      background: #020617;
      border-radius: 8px;
      border: 1px solid #374151;
      color: #e5e7eb;
      padding: 10px 12px;
      font-size: 14px;
      margin-bottom: 12px;
      resize: vertical;
    }
    textarea:focus, input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 1px #38bdf8;
    }
    .row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .row > div {
      flex: 1;
    }
    button {
      background: #38bdf8;
      border: none;
      color: #020617;
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .status {
      margin-top: 8px;
      font-size: 13px;
      color: #9ca3af;
    }
    .result-card {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #1f2937;
    }
    .decision-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .decision-go { background: #22c55e33; color: #4ade80; }
    .decision-conditions { background: #fbbf2433; color: #facc15; }
    .decision-wait { background: #fb923c33; color: #fdba74; }
    .decision-nogo { background: #ef444433; color: #fecaca; }
    .result-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .confidence {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 8px;
    }
    ul {
      padding-left: 18px;
      margin-top: 4px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    .section-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #6b7280;
      margin-top: 8px;
      margin-bottom: 2px;
    }
    .small {
      font-size: 12px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <h1>RA Groups Decision Assistant</h1>
      <p class="subtitle">
        Ask a decision question (market entry, product, risk) and get a short, clear recommendation.
      </p>

      <label for="query">Decision question</label>
      <textarea id="query" rows="3"
        placeholder="Example: Should RA Groups launch its AI-based SME lending product in the UAE market?"></textarea>

      <div class="row">
        <div>
          <label for="market">Target market</label>
          <input id="market" type="text" placeholder="UAE, Saudi Arabia, India..." />
        </div>
        <div>
          <label for="budget">Budget (USD)</label>
          <input id="budget" type="number" placeholder="1000000" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="timeline">Timeline (months)</label>
          <input id="timeline" type="number" placeholder="12" />
        </div>
        <div>
          <label for="company">Company name</label>
          <input id="company" type="text" value="RA Groups" />
        </div>
      </div>

      <button id="submitBtn">Get decision</button>
      <div class="status" id="status"></div>

      <div class="result-card" id="result" style="display:none;">
        <div id="decisionPill"></div>
        <div class="result-title" id="decisionTitle"></div>
        <div class="confidence" id="confidence"></div>

        <div class="section-label">Why this decision</div>
        <ul id="rationaleList"></ul>

        <div class="section-label">Key risks</div>
        <ul id="risksList"></ul>

        <div class="section-label">Next actions</div>
        <ul id="actionsList"></ul>

        <p class="small" id="summaryLine"></p>
      </div>
    </div>
  </div>

  <script>
    const submitBtn = document.getElementById('submitBtn');
    const statusEl = document.getElementById('status');
    const resultEl = document.getElementById('result');
    const decisionPillEl = document.getElementById('decisionPill');
    const decisionTitleEl = document.getElementById('decisionTitle');
    const confidenceEl = document.getElementById('confidence');
    const rationaleListEl = document.getElementById('rationaleList');
    const risksListEl = document.getElementById('risksList');
    const actionsListEl = document.getElementById('actionsList');
    const summaryLineEl = document.getElementById('summaryLine');

    function pillClass(decision) {
      if (decision === 'GO') return 'decision-pill decision-go';
      if (decision === 'GO_WITH_CONDITIONS') return 'decision-pill decision-conditions';
      if (decision === 'WAIT') return 'decision-pill decision-wait';
      return 'decision-pill decision-nogo';
    }

    submitBtn.addEventListener('click', async () => {
      const business_query = document.getElementById('query').value.trim();
      const market = document.getElementById('market').value.trim() || 'UAE';
      const budget = Number(document.getElementById('budget').value) || 1000000;
      const timeline_months = Number(document.getElementById('timeline').value) || 12;
      const company_name = document.getElementById('company').value.trim() || 'RA Groups';

      if (!business_query) {
        statusEl.textContent = 'Please enter a decision question.';
        return;
      }

      submitBtn.disabled = true;
      statusEl.textContent = 'Thinking...';
      resultEl.style.display = 'none';

      try {
        const resp = await fetch('/decide', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({
            business_query,
            market,
            company_name,
            budget,
            timeline_months
          })
        });

        if (!resp.ok) {
          const txt = await resp.text();
          statusEl.textContent = 'Error: ' + resp.status + ' ' + txt;
          submitBtn.disabled = false;
          return;
        }

        const data = await resp.json();

        // strategy_recommendation.raw_text is JSON-like as a string → try to parse
        let s = {};
        try {
          s = JSON.parse(data.strategy_recommendation.raw_text);
        } catch (e) {
          // if it contains ```json ``` fences, remove them and try again
          try {
            const cleaned = data.strategy_recommendation.raw_text
              .replace(/```json/gi, '')
              .replace(/```/g, '');
            s = JSON.parse(cleaned);
          } catch {
            s = {};
          }
        }

        const decision = s.decision || 'UNKNOWN';
        const confidence = s.confidence_percent ?? 0;
        const rationale = Array.isArray(s.strategic_rationale) ? s.strategic_rationale.slice(0, 3) : [];
        const risks = Array.isArray(s.key_risks) ? s.key_risks.slice(0, 3) : [];
        const actions = Array.isArray(s.must_do_actions_before_launch) ? s.must_do_actions_before_launch.slice(0, 3) : [];
        const summary = s.summary_statement || '';

        decisionPillEl.className = pillClass(decision);
        decisionPillEl.textContent = decision.replace(/_/g, ' ');

        decisionTitleEl.textContent = `Decision: ${decision.replace(/_/g, ' ')}`;
        confidenceEl.textContent = `Confidence: ${confidence}%`;

        rationaleListEl.innerHTML = '';
        risksListEl.innerHTML = '';
        actionsListEl.innerHTML = '';

        rationale.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          rationaleListEl.appendChild(li);
        });

        risks.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          risksListEl.appendChild(li);
        });

        actions.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          actionsListEl.appendChild(li);
        });

        summaryLineEl.textContent = summary;

        resultEl.style.display = 'block';
        statusEl.textContent = '';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
